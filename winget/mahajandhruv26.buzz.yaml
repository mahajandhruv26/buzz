PackageIdentifier: mahajandhruv26.buzz
PackageVersion: 1.0.0
PackageName: buzz
Publisher: mahajandhruv26
License: MIT
LicenseUrl: https://github.com/mahajandhruv26/buzz/blob/main/LICENSE
ShortDescription: Keep your Windows machine awake from the command line. Like macOS caffeinate, but for Windows.
Description: >-
  buzz is a Windows command-line tool that prevents your system from sleeping.
  It uses the Windows SetThreadExecutionState API to keep the system and/or display awake.
  Supports timed awakening, subprocess execution, user activity simulation, and PID watching.
  Single binary, ~200 KB, no installation, no dependencies, no admin rights.
Tags:
