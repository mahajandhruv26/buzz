name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Run tests
        run: cargo test

      - name: Package binary
        shell: pwsh
        run: |
          Compress-Archive -Path target/release/buzz.exe -DestinationPath buzz-x86_64-pc-windows-msvc.zip

      - name: Copy standalone exe
        shell: pwsh
        run: |
          Copy-Item target/release/buzz.exe buzz.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            buzz.exe
            buzz-x86_64-pc-windows-msvc.zip
          generate_release_notes: true
